*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#6366f1;--primary2:#818cf8;--primary3:#4f46e5;--bg:#faf8ff;--card:#fff;--border:#f0ecff;--sh:0 2px 12px rgba(99,102,241,.06);
--pink:#ec4899;--green:#10b981;--amber:#f59e0b;--sky:#0ea5e9;--red:#ef4444;
--tx:#1e1b4b;--t2:#64748b;--t3:#94a3b8;--r:16px;--nav:60px;--max:430px}
html{font-size:16px}body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:var(--max);margin:0 auto;overflow-x:hidden}
[dir="ltr"] body{font-family:'Inter','Tajawal',sans-serif}

.pg{display:none;padding-bottom:calc(var(--nav) + 10px);min-height:100vh}.pg.on{display:block}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--max);background:#fff;border-top:1px solid var(--border);display:flex;height:var(--nav);padding-bottom:env(safe-area-inset-bottom);z-index:100}
.nav-i{flex:1;text-align:center;padding:8px 0;cursor:pointer}.nav-i .ic{font-size:1.3rem;display:block;transition:transform .1s}.nav-i.on .ic{transform:scale(1.1)}.nav-i .lb{font-size:.55rem;display:block;margin-top:2px;color:var(--t3)}.nav-i.on .lb{color:var(--primary);font-weight:700}

/* HERO */
.hero{background:linear-gradient(135deg,#6366f1,#818cf8,#a78bfa);padding:24px 16px 28px;color:#fff;border-radius:0 0 28px 28px;margin-bottom:-14px;position:relative;z-index:2}
.hero::after{content:'';position:absolute;bottom:-14px;left:0;right:0;height:28px;background:var(--bg);border-radius:28px 28px 0 0}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.hero-hello{font-size:.78rem;opacity:.8}.hero-name{font-size:1.2rem;font-weight:900}
.hero-actions{display:flex;gap:8px}
.hero-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;display:flex;align-items:center;justify-content:center;font-size:1rem;cursor:pointer;position:relative}
.hero-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;background:var(--red);font-size:.5rem;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}

.search-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.2);backdrop-filter:blur(8px);border-radius:14px;padding:11px 16px;cursor:pointer}
.search-bar .ico{font-size:1rem;opacity:.7}.search-bar .txt{font-size:.85rem;opacity:.6;flex:1}

/* CATEGORIES */
.cats{display:flex;justify-content:space-around;padding:22px 16px 12px}
.cat-i{text-align:center;cursor:pointer;width:70px}
.cat-ic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 6px;box-shadow:0 4px 14px rgba(0,0,0,.06)}
.cat-lb{font-size:.62rem;font-weight:600;color:var(--t2)}

/* SECTION */
.sec{padding:4px 16px}.sec-t{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sec-t h3{font-size:1rem;font-weight:800}.sec-t a{font-size:.72rem;color:var(--primary);text-decoration:none;font-weight:600}

/* LISTING CARD */
.lcard{background:var(--card);border-radius:18px;overflow:hidden;margin-bottom:12px;box-shadow:var(--sh);cursor:pointer;border:1px solid var(--border)}
.lcard-img{height:160px;background-size:cover;background-position:center;position:relative}
.lcard-badge{position:absolute;top:10px;left:10px;padding:4px 10px;border-radius:8px;font-size:.6rem;font-weight:700;color:#fff}
[dir="ltr"] .lcard-badge{left:auto;right:10px}
.lcard-fav{position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.85);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;border:none}
[dir="ltr"] .lcard-fav{right:auto;left:10px}
.lcard-body{padding:12px 14px}
.lcard-type{font-size:.55rem;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.lcard-name{font-size:.95rem;font-weight:800;margin-top:2px}
.lcard-loc{font-size:.68rem;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:4px}
.lcard-row{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.lcard-rating{display:flex;align-items:center;gap:3px;font-size:.72rem;font-weight:600}
.lcard-price{font-size:.88rem;font-weight:800;color:var(--primary)}
.lcard-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.lcard-tag{font-size:.52rem;padding:2px 8px;border-radius:6px;background:#f0ecff;color:var(--primary);font-weight:600}

/* FEATURED SLIDER */
.featured{display:flex;gap:12px;overflow-x:auto;padding:0 16px 10px;-webkit-overflow-scrolling:touch}
.featured::-webkit-scrollbar{display:none}
.feat-card{flex:0 0 auto;width:280px;height:150px;border-radius:18px;overflow:hidden;position:relative;cursor:pointer;background-size:cover;background-position:center}
.feat-overlay{position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.7));display:flex;flex-direction:column;justify-content:flex-end;padding:14px}
.feat-badge{position:absolute;top:10px;right:10px;padding:4px 10px;border-radius:8px;background:var(--primary);color:#fff;font-size:.55rem;font-weight:700}
[dir="ltr"] .feat-badge{right:auto;left:10px}
.feat-name{font-size:.95rem;font-weight:800;color:#fff}
.feat-meta{font-size:.65rem;color:rgba(255,255,255,.8);margin-top:2px}

/* DETAIL PAGE */
.detail-hero{height:240px;background-size:cover;background-position:center;position:relative}
.detail-overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7))}
.detail-back{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.85);border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
[dir="ltr"] .detail-back{right:auto;left:14px}
.detail-body{padding:0 16px;margin-top:-40px;position:relative;z-index:2}
.detail-card{background:var(--card);border-radius:18px;padding:18px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.detail-type{font-size:.55rem;color:var(--primary);font-weight:700;text-transform:uppercase}
.detail-name{font-size:1.3rem;font-weight:900;margin-top:2px}
.detail-loc{font-size:.75rem;color:var(--t2);margin-top:4px}
.detail-stats{display:flex;gap:16px;margin-top:10px}
.detail-stat{font-size:.72rem;display:flex;align-items:center;gap:4px;color:var(--t2)}
.detail-stat b{color:var(--tx)}

.detail-section{padding:0 16px;margin-top:16px}
.detail-section h4{font-size:.88rem;font-weight:800;margin-bottom:8px}

.facility-grid{display:flex;gap:8px;flex-wrap:wrap}
.facility{display:flex;align-items:center;gap:5px;padding:6px 12px;background:#f0ecff;border-radius:10px;font-size:.68rem;font-weight:600;color:var(--primary)}

.pkg-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px;margin-bottom:8px;cursor:pointer}
.pkg-card.on{border-color:var(--primary);background:#faf8ff}
.pkg-name{font-size:.85rem;font-weight:700}.pkg-price{font-size:1.1rem;font-weight:900;color:var(--primary);margin-top:2px}
.pkg-dur{font-size:.65rem;color:var(--t2)}

.action-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:var(--max);padding:10px 16px;background:#fff;border-top:1px solid var(--border);display:flex;gap:10px;z-index:100}
.action-btn{flex:1;padding:14px;border-radius:14px;border:none;font-size:.9rem;font-weight:800;cursor:pointer;font-family:inherit;text-align:center}
.btn-primary{background:var(--primary);color:#fff;box-shadow:0 4px 16px rgba(99,102,241,.3)}
.btn-wa{background:#25d366;color:#fff}
.btn-call{background:var(--sky);color:#fff}
.btn-outline{background:#fff;border:2px solid var(--primary);color:var(--primary)}

.offer-banner{margin:0 16px 12px;border-radius:16px;padding:16px;position:relative;overflow:hidden;cursor:pointer}
.offer-banner::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1)}

.prof-header{background:linear-gradient(135deg,var(--primary),var(--primary2));padding:30px 16px;color:#fff;text-align:center;border-radius:0 0 28px 28px}
.prof-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 10px;border:3px solid rgba(255,255,255,.3)}
.prof-name{font-size:1.2rem;font-weight:900}
.prof-phone{font-size:.75rem;opacity:.7;margin-top:2px}
.prof-kids{display:flex;gap:8px;justify-content:center;margin-top:12px}
.prof-kid{padding:6px 14px;border-radius:20px;background:rgba(255,255,255,.15);font-size:.7rem;font-weight:600}

.menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border);cursor:pointer}
.menu-ico{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.menu-lbl{font-size:.88rem;font-weight:600;flex:1}
.menu-arr{color:var(--t3);font-size:.8rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lcard,.feat-card,.pkg-card,.menu-item{animation:fadeUp .25s ease both}
::-webkit-scrollbar{width:0}
</style>

body.appendChild(n('div',{style:{fontSize:'.82rem',fontWeight:'700',margin:'14px 0 8px',color:'var(--t2)'}},t('couponCode')));
var couponRow=n('div',{style:{display:'flex',gap:'8px'}});
var ci=n('input',{type:'text',placeholder:'SUMMER25',style:{flex:'1',padding:'12px 14px',borderRadius:'12px',border:'1.5px solid var(--border)',fontSize:'.88rem',fontFamily:'inherit',direction:'ltr'}});

couponRow.appendChild(n('button',{style:{padding:'12px 18px',borderRadius:'12px',background:'var(--primary)',color:'#fff',border:'none',fontSize:'.82rem',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'},onclick:function(){if(S.coupon.toUpperCase()==='SUMMER25'||S.coupon.toUpperCase()==='WAIN10'){S.couponOk=true;render()}}},t('apply')));
body.appendChild(couponRow);
if(S.couponOk)body.appendChild(n('div',{style:{color:'#059669',fontSize:'.72rem',marginTop:'4px'}},'✓ '+(isRtl()?'تم تطبيق الخصم ٢٠٪':'20% discount applied!')));

// Payment method
body.appendChild(n('div',{style:{fontSize:'.82rem',fontWeight:'700',margin:'14px 0 8px',color:'var(--t2)'}},t('paymentMethod')));
[['knet','🏧',t('knet')],['card','💳',t('creditCard')],['apple','',t('applePay')],['cash','💵',t('cash')]].forEach(function(m){

mo.appendChild(n('span',{style:{fontSize:'1.2rem'}},m[1]));
mo.appendChild(n('span',{style:{fontSize:'.85rem',fontWeight:'600',flex:'1'}},m[2]));
var radio=n('div',{style:{width:'18px',height:'18px',borderRadius:'50%',border:'2px solid '+(S.payMethod===m[0]?'var(--primary)':'#cbd5e1'),display:'flex',alignItems:'center',justifyContent:'center'}});
if(S.payMethod===m[0])radio.appendChild(n('div',{style:{width:'10px',height:'10px',borderRadius:'50%',background:'var(--primary)'}}));
mo.appendChild(radio);
body.appendChild(mo);
});

sheet.appendChild(body);

// Total + CTA
var pkg=l.prices[S.selectedPkg];
var disc=S.couponOk?pkg.price*0.2:0;
var total=pkg.price-disc;

var cta=n('div',{style:{position:'fixed',bottom:'0',left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:'var(--max)',padding:'12px 16px',background:'#fff',borderTop:'1px solid var(--border)'}});
if(disc>0)cta.appendChild(n('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.78rem',color:'#059669',marginBottom:'4px'}},n('span',{},t('discount')),n('span',{},'-'+disc.toFixed(0)+' '+t('kd'))));
var totalRow=n('div',{style:{display:'flex',justifyContent:'space-between',fontSize:'.95rem',fontWeight:'800',marginBottom:'10px'}});
totalRow.appendChild(n('span',{},t('total')));
totalRow.appendChild(n('span',{style:{color:'var(--primary)'}},total.toFixed(0)+' '+t('kd')));
cta.appendChild(totalRow);
cta.appendChild(n('button',{style:{width:'100%',padding:'15px',borderRadius:'14px',border:'none',background:'linear-gradient(135deg,#059669,#10b981)',color:'#fff',fontSize:'1rem',fontWeight:'800',cursor:'pointer',fontFamily:'inherit',boxShadow:'0 4px 16px rgba(5,150,105,.3)'},onclick:function(){S.bookingConfirmed=true;render()}},t('confirmBooking')+' — '+total.toFixed(0)+' '+t('kd')));
sheet.appendChild(cta);

root.appendChild(sheet);return;
}

if(S.page==='detail'&&S.detail){root.appendChild(renderDetail());return}

var pages={home:renderHome,search:renderSearch,favs:renderFavs,bookings:renderBookings,profile:renderProfile};
root.appendChild((pages[S.tab]||renderHome)());
renderNav(root);
}

// Recommended

// ═══ LISTING CARD ═══
function renderListingCard(l){
var card=n('div',{className:'lcard',onclick:function(){S.detail=l;S.page='detail';render()}});
var img=n('div',{className:'lcard-img',style:{background:l.gradient}});
img.appendChild(n('div',{className:'lcard-badge',style:{background:TYPE_COLORS[l.type]}},typeLabel(l.type)));
var fav=n('button',{className:'lcard-fav',onclick:function(e){e.stopPropagation();S.favs[l.id]=!S.favs[l.id];render()}});fav.textContent=S.favs[l.id]?'❤️':'🤍';
img.appendChild(fav);
img.appendChild(n('div',{style:{position:'absolute',bottom:14,left:14,right:14,display:'flex',gap:6}},l.photos.map(function(p){return n('span',{style:{fontSize:'1.6rem',filter:'drop-shadow(0 2px 4px rgba(0,0,0,.3))'}},p)})));
card.appendChild(img);

var body=n('div',{className:'lcard-body'});
body.appendChild(n('div',{className:'lcard-name'},ln(l)));
body.appendChild(n('div',{className:'lcard-loc'},'📍 '+areaLabel(l.area)+' · '+la(l)));
var row=n('div',{className:'lcard-row'});
row.appendChild(n('div',{className:'lcard-rating',innerHTML:'⭐ <b>'+l.rating+'</b> ('+l.reviews+' '+t('reviews')+')'}));
row.appendChild(n('div',{className:'lcard-price'},t('from')+' '+l.prices[0].price+' '+t('kd')));
body.appendChild(row);

var tags=n('div',{className:'lcard-tags'});
tags.appendChild(n('span',{className:'lcard-tag'},t('age')+': '+l.age_min+'-'+l.age_max+' '+t('years')));
if(l.transport)tags.appendChild(n('span',{className:'lcard-tag'},'🚌 '+t('bus')));
l.facilities.slice(0,3).forEach(function(f){tags.appendChild(n('span',{className:'lcard-tag'},(FACILITY_ICONS[f]||'')+' '+t(f)))});
body.appendChild(tags);card.appendChild(body);
return card}

// ═══ SEARCH ═══
function renderSearch(){
var pg=n('div',{className:'pg on'});
pg.appendChild(n('div',{style:{padding:'20px 16px 10px',fontSize:'1.3rem',fontWeight:'900'}},t('search')));

// Filter tabs

['all','nursery','summer_club','activity','babysitter'].forEach(function(tp){

btn.textContent=(tp==='all'?t('all'):TYPE_ICONS[tp]+' '+typeLabel(tp));
tabs.appendChild(btn)});
pg.appendChild(tabs);

// Area filter
var areas=n('div',{style:{display:'flex',gap:'5px',padding:'0 16px 12px',overflowX:'auto'}});
['','salmiya','hawalli','farwaniya','sabahSalem','jahra','capital'].forEach(function(a){
var active=S.filterArea===a;
areas.appendChild(n('button',{style:{padding:'5px 12px',borderRadius:'16px',background:active?'#f0ecff':'var(--card)',color:active?'var(--primary)':'var(--t3)',border:'1px solid var(--border)',fontSize:'.6rem',fontWeight:'600',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap'},onclick:function(){S.filterArea=a;render()}},a?areaLabel(a):t('allAreas')))});
pg.appendChild(areas);

// Results
var results=LISTINGS.filter(function(l){
if(S.filterType&&l.type!==S.filterType)return false;

results.forEach(function(l){pg.appendChild(renderListingCard(l))});
if(results.length===0)pg.appendChild(n('div',{style:{textAlign:'center',padding:'50px',color:'var(--t3)',fontSize:'.88rem'}},'😢 '+(S.lang==='ar'?'لا توجد نتائج':'No results found')));

return pg}

{id:'WB-2840',listing:'Al Noor Nursery',listing_ar:'حضانة النور',pkg:'Full Month',pkg_ar:'شهري كامل',amount:180,status:'pending',date:'2025-06-01',end:'2025-06-30',color:'#ec4899',progress:10}

// ═══ NAV ═══

render();
