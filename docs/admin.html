<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wain Admin Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f1f5f9;color:#1e293b;display:flex;min-height:100vh}
.sidebar{width:240px;background:#1e293b;color:#fff;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
.sb-logo{padding:0 20px 20px;border-bottom:1px solid #334155;display:flex;align-items:center;gap:10px;font-size:1.1rem;font-weight:800}
.sb-logo svg{width:32px;height:32px}
.sb-menu{padding:12px 0}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;transition:all .15s;font-size:.85rem;color:#94a3b8;font-weight:500}
.sb-item:hover{background:#334155;color:#fff}
.sb-item.on{background:#6366f1;color:#fff;font-weight:600}
.sb-item .ico{font-size:1.1rem;width:24px;text-align:center}
.sb-section{padding:16px 20px 6px;font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:#475569;font-weight:700}
.main{margin-left:240px;flex:1;padding:24px}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
.top-bar h1{font-size:1.5rem;font-weight:800}
.top-bar-r{display:flex;align-items:center;gap:12px}
.top-btn{padding:8px 16px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:.82rem;cursor:pointer;font-family:inherit;font-weight:600;color:#64748b}
.top-btn.primary{background:#6366f1;color:#fff;border:none}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.stat-label{font-size:.72rem;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:2rem;font-weight:900;margin-top:4px;color:#1e293b}
.stat-change{font-size:.72rem;margin-top:4px;font-weight:600}
.stat-up{color:#10b981}
.stat-down{color:#ef4444}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);margin-bottom:16px}
.card-title{font-size:.95rem;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.card-title .badge{font-size:.65rem;padding:3px 8px;border-radius:6px;background:#eff6ff;color:#3b82f6;font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:.7rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #f1f5f9}
td{padding:12px;font-size:.82rem;border-bottom:1px solid #f8fafc}
tr:hover td{background:#faf8ff}
.status{padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:600}
.s-pending{background:#fef3c7;color:#92400e}
.s-confirmed{background:#d1fae5;color:#065f46}
.s-completed{background:#e0e7ff;color:#3730a3}
.s-cancelled{background:#fee2e2;color:#991b1b}
.user-row{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-size:.75rem}
.action-btn{padding:4px 10px;border-radius:6px;border:1px solid #e2e8f0;background:#fff;font-size:.7rem;cursor:pointer;font-family:inherit;margin-right:4px}
.action-btn.approve{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
.action-btn.reject{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.action-btn.edit{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.chart-placeholder{height:200px;background:linear-gradient(135deg,#f8fafc,#eff6ff);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:.85rem}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.toggle{width:40px;height:22px;border-radius:11px;background:#cbd5e1;position:relative;cursor:pointer;transition:background .2s}
.toggle.on{background:#6366f1}
.toggle::after{content:'';width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.toggle.on::after{left:20px}
.tab-bar{display:flex;border-bottom:2px solid #f1f5f9;margin-bottom:16px}
.tab{padding:10px 20px;font-size:.82rem;font-weight:600;color:#94a3b8;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:#6366f1;border-color:#6366f1}
.empty{text-align:center;padding:40px;color:#94a3b8}
.empty .ico{font-size:3rem;margin-bottom:10px}
</style>
</head>

<span>Wain Admin</span>

<div style="padding:16px 20px;border-top:1px solid #334155;margin-top:20px">

var currentSection='dashboard';
function showSection(s){
currentSection=s;
document.querySelectorAll('.sb-item').forEach(function(i){i.classList.remove('on')});
event.currentTarget.classList.add('on');
render();
}

function render(){
var c=document.getElementById('content');
c.innerHTML='';
var renderers={dashboard:renderDashboard,listings:renderListings,bookings:renderBookings,users:renderUsers,reviews:renderReviews,coupons:renderCoupons,notifications:renderNotifications,settings:renderSettings};

}
