<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#6366f1"/>
    <stop offset="50%" stop-color="#818cf8"/>
    <stop offset="100%" stop-color="#a78bfa"/>
  </linearGradient>
  <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fff" stop-opacity=".95"/>
    <stop offset="100%" stop-color="#e0e7ff" stop-opacity=".9"/>
  </linearGradient>
  <filter id="shadow">
    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338ca" flood-opacity=".3"/>
  </filter>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>
<!-- Background circle -->
<circle cx="100" cy="100" r="96" fill="url(#bg)" filter="url(#shadow)"/>
<circle cx="100" cy="100" r="90" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
<circle cx="100" cy="100" r="84" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
<!-- Pin shape -->
<path d="M100 30 C72 30 50 52 50 80 C50 115 100 160 100 160 C100 160 150 115 150 80 C150 52 128 30 100 30Z" fill="url(#pin)" opacity=".92"/>
<circle cx="100" cy="78" r="22" fill="none" stroke="#6366f1" stroke-width="3" opacity=".3"/>
<circle cx="100" cy="78" r="12" fill="#6366f1" opacity=".2"/>
<!-- Stars around pin -->
<text x="70" y="55" font-size="14" opacity=".7">⭐</text>
<text x="125" y="50" font-size="10" opacity=".5">✨</text>
<text x="60" y="105" font-size="12" opacity=".6">🎈</text>
<text x="138" y="100" font-size="11" opacity=".5">🎯</text>
<!-- Wain text inside pin -->
<text x="100" y="82" text-anchor="middle" font-family="Inter,sans-serif" font-size="26" font-weight="900" fill="#4338ca" letter-spacing="-1">WAIN</text>
<!-- Arabic وين below -->
<text x="100" y="140" text-anchor="middle" font-family="Tajawal,sans-serif" font-size="32" font-weight="900" fill="#fff" opacity=".95">وين</text>
<!-- Tagline -->
<text x="100" y="182" text-anchor="middle" font-family="Tajawal,sans-serif" font-size="11" fill="rgba(255,255,255,.5)" font-weight="600">Kuwait Kids Activities</text>
</svg>
